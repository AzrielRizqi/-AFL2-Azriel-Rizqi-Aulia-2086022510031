<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeSync Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="main-bg d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                
                <div class="text-center mb-5">
                    <h1 class="text-white fw-bold display-6">
                        Sign in to Vibe<span class="text-accent">Sync</span>
                    </h1>
                </div>

                <form action="main.html">
                    <div class="mb-4">
                        <input type="text" class="form-control custom-input" placeholder="Email/Username" aria-label="Email or Username" required>
                    </div>
                    <div class="mb-5">
                        <input type="password" class="form-control custom-input" placeholder="Password" aria-label="Password" required>
                    </div>
                    
                    <div class="text-center">
                        <button type="submit" class="btn btn-light rounded-pill px-5 py-2 fw-bold login-btn">
                            Sign In
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
